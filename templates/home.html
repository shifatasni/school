{% extends 'new.html' %}
{% load static %}
{% block title %}home{% endblock%}
{% block content %}

 

<style>
 
 
 
 #uploadArea {
    width: 1200px;
    height: 550px;
    border: 2px solid #888;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    background-color: #f9f9f9;
    margin: 20px;
  }

  #uploadArea img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  #fileInput {
    display: none;
  }
</style>

<!-- Blank space -->
<div id="uploadArea">Click here to add image</div>

<!-- Hidden file input -->
<input type="file" id="fileInput" accept="image/*">

<script>
  const uploadArea = document.getElementById('uploadArea');
  const fileInput = document.getElementById('fileInput');

  let tempImageData = null;

  // 🔹 LOAD SAVED IMAGE ON PAGE LOAD
  const savedImage = localStorage.getItem('uploadedImage');
  if (savedImage) {
    uploadArea.innerHTML = `<img src="${savedImage}" alt="Saved Image">`;
  }

  // 🔹 CLICK AREA → OPEN FILE PICKER
  uploadArea.addEventListener('click', () => {
    fileInput.click();
  });

  // 🔹 WHEN USER SELECTS IMAGE
  fileInput.addEventListener('change', function () {
    const file = this.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function (e) {
      tempImageData = e.target.result;

      // Show image
      uploadArea.innerHTML = `<img src="${tempImageData}" alt="Uploaded Image">`;

      // ✅ SAVE IMAGE
      localStorage.setItem('uploadedImage', tempImageData);
    };
    reader.readAsDataURL(file);
  });
</script>




 

 
  <!-- Clickable blank space -->
  <div id="logoBox" >
    <span id="text">Click to upload logo</span>
   </div>

  <!-- Hidden file input -->
  <input type="file" id="logoInput" accept="image/*">

  <script>
    const logoBox = document.getElementById("logoBox");
    const logoInput = document.getElementById("logoInput");
    const text = document.getElementById("text");

    // Load saved logo
    const savedLogo = localStorage.getItem("siteLogo");
    if (savedLogo) {
      logoBox.innerHTML = `<img src="${savedLogo}">`;
    }

    // Click box → open file dialog
    logoBox.addEventListener("click", () => {
      logoInput.click();
    });

    // Upload logo
    logoInput.addEventListener("change", function () {
      const file = this.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function (e) {
        logoBox.innerHTML = `<img src="${e.target.result}">`;
        localStorage.setItem("siteLogo", e.target.result);
      };
      reader.readAsDataURL(file);
    });
  </script>





{% endblock %}
